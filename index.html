<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💪 WorkingMap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
.page{display:none;padding:20px;max-width:480px;margin:0 auto;min-height:100vh}
.page.active{display:block}
h1{text-align:center;font-size:1.6rem;color:#fff;margin-bottom:4px}
.sub{text-align:center;color:#666;font-size:0.85rem;margin-bottom:20px}
.card{background:#1a1d27;border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid #2a2d3e}
.card h2{font-size:0.8rem;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
input{background:#0f1117;border:1px solid #3a3d52;color:#fff;padding:10px 12px;border-radius:8px;font-size:1rem;width:100%;outline:none;margin-bottom:10px}
input:focus{border-color:#4fc3f7}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-primary{background:#4fc3f7;color:#0f1117}
.btn-secondary{background:#1a1d27;color:#aaa;border:1px solid #3a3d52}
.btn-danger{background:#c62828;color:#fff}
.btn-success{background:#2e7d32;color:#fff}
.btn:disabled{background:#2a2d3e;color:#555;cursor:not-allowed}
.error{color:#ef5350;font-size:.85rem;text-align:center;margin-bottom:10px;min-height:20px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.cat-btn{padding:14px 8px;border-radius:10px;border:2px solid #2a2d3e;background:#0f1117;color:#aaa;font-size:.85rem;font-weight:600;cursor:pointer;text-align:center}
.cat-btn.selected{border-color:#4fc3f7;color:#4fc3f7;background:#0d2233}
.cat-btn.locked{color:#444;cursor:not-allowed}
.ex-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:10px;border:2px solid #2a2d3e;background:#0f1117;margin-bottom:8px;cursor:pointer}
.ex-item.selected{border-color:#4fc3f7;background:#0d2233}
.ex-name{font-size:.95rem;font-weight:600}
.ex-info{font-size:.78rem;color:#666}
.ex-weight{font-size:.9rem;color:#4fc3f7;font-weight:700}
.set-dots{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:12px 0}
.dot{width:46px;height:46px;border-radius:50%;border:2px solid #3a3d52;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:#0f1117}
.dot.current{border-color:#4fc3f7;box-shadow:0 0 14px #4fc3f7aa;animation:pulse 1s infinite alternate}
.dot.success{background:#1b3a2f;border-color:#66bb6a;color:#66bb6a}
.dot.fail{background:#3a1b1b;border-color:#ef5350;color:#ef5350}
@keyframes pulse{from{box-shadow:0 0 6px #4fc3f7aa}to{box-shadow:0 0 18px #4fc3f7}}
.timer-box{background:#0f1117;border-radius:12px;padding:20px;text-align:center;border:1px solid #2a2d3e}
.timer-ring-wrap{position:relative;width:120px;height:120px;margin:10px auto}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#2a2d3e;stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ring-success .ring-fg{stroke:#66bb6a}
.ring-fail .ring-fg{stroke:#ef5350}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;font-weight:800;color:#fff}
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.summary-box{background:#0f1117;border-radius:10px;padding:14px;text-align:center;border:1px solid #2a2d3e}
.summary-box .num{font-size:1.5rem;font-weight:800;color:#4fc3f7}
.summary-box .lbl{font-size:.75rem;color:#666;margin-top:3px}
.nav{display:flex;justify-content:space-around;background:#1a1d27;border-top:1px solid #2a2d3e;padding:10px 0;position:fixed;bottom:0;left:0;right:0}
.nav-btn{background:none;border:none;color:#666;font-size:.7rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px}
.nav-btn.active{color:#4fc3f7}
.nav-btn span{font-size:1.3rem}
.pb{padding-bottom:70px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.tag-success{background:#1b3a2f;color:#66bb6a}
.tag-lock{background:#2a2d3e;color:#888}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #1e2133;font-size:.85rem}
</style>
</head>
<body>
<div class="page active" id="page-auth">
<br><br>
<h1>💪 WorkingMap</h1>
<p class="sub">점진적 과부화 운동 트래커</p>
<div class="card">
<h2 id="auth-title">로그인</h2>
<input type="text" id="auth-username" placeholder="사용자 이름" style="display:none"/>
<input type="email" id="auth-email" placeholder="이메일"/>
<input type="password" id="auth-password" placeholder="비밀번호"/>
<div class="error" id="auth-error"></div>
<button class="btn btn-primary" onclick="submitAuth()">로그인</button>
<button class="btn btn-secondary" onclick="toggleAuth()" id="auth-toggle-btn">회원가입 하러가기</button>
</div>
</div>
<div class="page pb" id="page-home">
<h1>💪 WorkingMap</h1>
<p class="sub" id="home-greeting"></p>
<div class="card">
<h2>📅 오늘의 운동 부위 선택</h2>
<p style="font-size:.82rem;color:#666;margin-bottom:12px">⏳ 48시간이 지난 부위만 선택 가능해요</p>
<div class="cat-grid" id="cat-grid"></div>
<button class="btn btn-primary" id="btn-go-exercises" onclick="goExercises()" disabled>종목 선택하기 →</button>
</div>
<div class="card">
<h2>📈 최근 진행 현황</h2>
<div id="home-progress-list"><p style="color:#555;font-size:.85rem">운동 기록이 없어요. 첫 운동을 시작해보세요!</p></div>
</div>
</div>
<div class="page pb" id="page-exercises">
<h1>🏋️ 종목 선택</h1>
<p class="sub">3가지 종목을 선택하세요</p>
<div class="card">
<div id="ex-list"></div>
<button class="btn btn-primary" id="btn-start-workout" onclick="startWorkout()" disabled>운동 시작 (0/3)</button>
<button class="btn btn-secondary" onclick="showPage('page-home')">← 돌아가기</button>
</div>
</div>
<div class="page pb" id="page-tracker">
<h1 id="tracker-title">운동 중</h1>
<p class="sub" id="tracker-sub"></p>
<div class="card">
<h2 id="current-ex-name">종목명</h2>
<div class="set-dots" id="set-dots"></div>
<p style="text-align:center;color:#aaa;font-size:.9rem;margin-bottom:14px" id="set-status"></p>
<div style="display:flex;gap:10px;margin-bottom:14px" id="action-btns">
<button class="btn btn-success" style="flex:1" id="btn-ok" onclick="recordSet(true)">✅ 성공</button>
<button class="btn btn-danger" style="flex:1" id="btn-fail" onclick="recordSet(false)">❌ 실패</button>
</div>
<div class="timer-box" id="timer-box" style="display:none">
<p id="timer-label" style="color:#888;font-size:.85rem;margin-bottom:6px"></p>
<div class="timer-ring-wrap" id="timer-ring-wrap">
<svg viewBox="0 0 120 120" width="120" height="120">
<circle class="ring-bg" cx="60" cy="60" r="50"/>
<circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="0"/>
</svg>
<div class="timer-num" id="timer-num">0:00</div>
</div>
<button class="btn btn-secondary" style="width:auto;padding:8px 20px;margin:0 auto;display:block" onclick="skipTimer()">건너뛰기 ⏩</button>
</div>
</div>
<div class="card">
<h2>오늘의 운동 목록</h2>
<div id="workout-progress-list"></div>
</div>
</div>
<div class="page pb" id="page-done">
<h1 id="done-emoji" style="font-size:3rem;margin-top:20px">🎉</h1>
<p class="sub" id="done-title">운동 완료!</p>
<div class="card">
<div class="set-dots" id="done-dots"></div>
<div class="summary-grid" id="done-stats" style="margin-top:14px"></div>
<div style="margin-top:14px;padding:12px;background:#0f1117;border-radius:10px;text-align:center">
<p style="color:#888;font-size:.82rem">다음 운동일 예정 무게</p>
<p id="done-next-weight" style="color:#4fc3f7;font-size:1.1rem;font-weight:700;margin-top:4px"></p>
</div>
</div>
<button class="btn btn-primary" onclick="nextExercise()">다음 종목 →</button>
<button class="btn btn-secondary" onclick="showPage('page-home')">🏠 홈으로</button>
</div>
<div class="page pb" id="page-history">
<h1>📊 운동 히스토리</h1>
<p class="sub">나의 점진적 과부화 기록</p>
<div class="card">
<div id="history-list"><p style="color:#555">기록이 없어요.</p></div>
</div>
</div>
<nav class="nav" id="main-nav" style="display:none">
<button class="nav-btn active" id="nav-home" onclick="navTo('page-home','nav-home')"><span>🏠</span>홈</button>
<button class="nav-btn" id="nav-history" onclick="navTo('page-history','nav-history')"><span>📊</span>기록</button>
<button class="nav-btn" id="nav-logout" onclick="logout()"><span>🚪</span>로그아웃</button>
</nav>
<script>
const API='https://workingmap.onrender.com';
let token=localStorage.getItem('wm_token')||'';
let currentUser=JSON.parse(localStorage.getItem('wm_user')||'null');
let selectedCategory='';
let selectedExercises=[];
let currentExIndex=0;
let currentSetResults=[];
let timerInterval=null;
const CIRC=314;
async function api(method,path,body){
const res=await fetch(API+path,{method,headers:{'Content-Type':'application/json',...(token?{'Authorization':'Bearer '+token}:{})},body:body?JSON.stringify(body):undefined});
const data=await res.json().catch(()=>({}));
if(!res.ok)throw new Error(data.detail||'오류가 발생했습니다.');
return data;
}
let isLogin=true;
function toggleAuth(){
isLogin=!isLogin;
document.getElementById('auth-title').textContent=isLogin?'로그인':'회원가입';
document.getElementById('auth-toggle-btn').textContent=isLogin?'회원가입 하러가기':'로그인 하러가기';
document.getElementById('auth-username').style.display=isLogin?'none':'block';
document.getElementById('auth-error').textContent='';
}
async function submitAuth(){
const email=document.getElementById('auth-email').value.trim();
const password=document.getElementById('auth-password').value;
const username=document.getElementById('auth-username').value.trim();
const errEl=document.getElementById('auth-error');
errEl.textContent='';
try{
if(isLogin){
const data=await api('POST','/auth/login',{email,password});
token=data.access_token;
localStorage.setItem('wm_token',token);
const me=await api('GET','/users/me');
currentUser=me;
localStorage.setItem('wm_user',JSON.stringify(me));
enterApp();
}else{
if(!username){errEl.textContent='사용자 이름을 입력해주세요.';return;}
await api('POST','/auth/register',{email,password,username});
const data=await api('POST','/auth/login',{email,password});
token=data.access_token;
localStorage.setItem('wm_token',token);
const me=await api('GET','/users/me');
currentUser=me;
localStorage.setItem('wm_user',JSON.stringify(me));
enterApp();
}
}catch(e){errEl.textContent=e.message;}
}
function logout(){
token='';currentUser=null;
localStorage.removeItem('wm_token');
localStorage.removeItem('wm_user');
document.getElementById('main-nav').style.display='none';
showPage('page-auth');
}
function enterApp(){
document.getElementById('main-nav').style.display='flex';
navTo('page-home','nav-home');
loadHome();
}
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function navTo(pageId,navId){
showPage(pageId);
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(navId).classList.add('active');
if(pageId==='page-home')loadHome();
if(pageId==='page-history')loadHistory();
}
async function loadHome(){
document.getElementById('home-greeting').textContent='안녕하세요, '+(currentUser?.username||'')+'님! 💪';
try{
const available=await api('GET','/exercises/available');
renderCatGrid(available);
renderProgressList(available);
}catch(e){}
}
function renderCatGrid(available){
const cats={chest:'가슴 🫁',back:'등 🔙',shoulder:'어깨 💪',leg:'하체 🦵',arm:'팔 💪',core:'코어 🔥'};
const catOk={};
for(const c of Object.keys(cats)){catOk[c]=available.filter(e=>e.category===c).some(e=>e.cooldown_ok);}
const grid=document.getElementById('cat-grid');
grid.innerHTML='';
for(const[c,label]of Object.entries(cats)){
const btn=document.createElement('button');
btn.className='cat-btn'+(catOk[c]?'':' locked');
btn.innerHTML=label+(catOk[c]?'':'<br><span style="font-size:.65rem;color:#555">⏳ 쿨다운</span>');
if(catOk[c])btn.onclick=()=>selectCat(c,btn);
grid.appendChild(btn);
}
}
function selectCat(cat,btn){
document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
btn.classList.add('selected');
selectedCategory=cat;
document.getElementById('btn-go-exercises').disabled=false;
}
function renderProgressList(available){
const recent=available.filter(e=>e.last_trained).slice(0,5);
const el=document.getElementById('home-progress-list');
if(!recent.length){el.innerHTML='<p style="color:#555;font-size:.85rem">운동 기록이 없어요.</p>';return;}
el.innerHTML=recent.map(e=>`<div class="hist-row"><span>${e.name}</span><span style="color:#4fc3f7;font-weight:700">${e.current_weight}kg</span><span class="${e.cooldown_ok?'tag tag-success':'tag tag-lock'}">${e.cooldown_ok?'✅ 가능':'⏳ 쿨다운'}</span></div>`).join('');
}
async function goExercises(){
if(!selectedCategory)return;
try{
const available=await api('GET','/exercises/available?category='+selectedCategory);
renderExerciseList(available.filter(e=>e.cooldown_ok));
showPage('page-exercises');
}catch(e){}
}
let selectedExIds=[];
function renderExerciseList(exercises){
selectedExIds=[];selectedExercises=[];
document.getElementById('ex-list').innerHTML=exercises.map(e=>`<div class="ex-item" id="ex-${e.id}" onclick="toggleEx(${e.id},'${e.name}',${e.current_weight},${e.injury_risk?1:0},${e.next_weight-e.current_weight})"><div><div class="ex-name">${e.name}</div><div class="ex-info">${e.injury_risk?'⚠️ 부상주의':'일반'} · 다음 증가: +${e.next_weight-e.current_weight}kg</div></div><div class="ex-weight">${e.current_weight}kg</div></div>`).join('');
updateStartBtn();
}
function toggleEx(id,name,weight,injuryRisk,increment){
const el=document.getElementById('ex-'+id);
const idx=selectedExIds.indexOf(id);
if(idx>-1){selectedExIds.splice(idx,1);selectedExercises=selectedExercises.filter(e=>e.id!==id);el.classList.remove('selected');}
else{if(selectedExIds.length>=3)return;selectedExIds.push(id);selectedExercises.push({id,name,weight,injuryRisk,increment});el.classList.add('selected');}
updateStartBtn();
}
function updateStartBtn(){
const btn=document.getElementById('btn-start-workout');
btn.textContent=`운동 시작 (${selectedExIds.length}/3)`;
btn.disabled=selectedExIds.length!==3;
}
function startWorkout(){currentExIndex=0;startExercise();}
function startExercise(){
currentSetResults=[];
const ex=selectedExercises[currentExIndex];
document.getElementById('tracker-title').textContent=`${currentExIndex+1} / ${selectedExercises.length} 종목`;
document.getElementById('current-ex-name').textContent=`${ex.name} · ${ex.weight}kg`;
renderTrackerDots();renderWorkoutProgressList();
setActionBtns(true);
document.getElementById('timer-box').style.display='none';
showPage('page-tracker');
}
function renderTrackerDots(){
const el=document.getElementById('set-dots');el.innerHTML='';
for(let i=0;i<5;i++){
const d=document.createElement('div');d.className='dot';
if(i<currentSetResults.length){d.classList.add(currentSetResults[i]?'success':'fail');d.textContent=currentSetResults[i]?'●':'○';}
else if(i===currentSetResults.length){d.classList.add('current');d.textContent='?';}
else{d.textContent='·';}
el.appendChild(d);
}
document.getElementById('set-status').textContent=currentSetResults.length<5?`${currentSetResults.length+1}세트 / 5세트`:'완료!';
}
function renderWorkoutProgressList(){
document.getElementById('workout-progress-list').innerHTML=selectedExercises.map((e,i)=>{
const status=i<currentExIndex?'<span class="tag tag-success">완료</span>':i===currentExIndex?'<span class="tag" style="background:#1a3a4a;color:#4fc3f7">진행중</span>':'<span class="tag tag-lock">대기</span>';
return`<div class="hist-row"><span>${e.name}</span><span style="color:#4fc3f7">${e.weight}kg</span>${status}</div>`;
}).join('');
}
function setActionBtns(enabled){
document.getElementById('btn-ok').disabled=!enabled;
document.getElementById('btn-fail').disabled=!enabled;
}
function recordSet(success){
currentSetResults.push(success);renderTrackerDots();setActionBtns(false);
if(currentSetResults.length===5){saveWorkoutLog();}
else{startTimer(success?90:180,success?'✅ 성공! 휴식 1분 30초':'❌ 실패. 휴식 3분',success?'success':'fail',()=>{renderTrackerDots();setActionBtns(true);});}
}
async function saveWorkoutLog(){
const ex=selectedExercises[currentExIndex];
try{await api('POST','/workouts/log',{exercise_id:ex.id,weight:ex.weight,set_results:currentSetResults});}catch(e){}
showDone();
}
function showDone(){
const ex=selectedExercises[currentExIndex];
const successCount=currentSetResults.filter(Boolean).length;
const allSuccess=successCount===5;
const rate=Math.round(successCount/5*100);
const volume=ex.weight*successCount*12;
const nextWeight=allSuccess?ex.weight+ex.increment:ex.weight;
document.getElementById('done-emoji').textContent=rate===100?'🏆':rate>=60?'💪':'😤';
document.getElementById('done-title').textContent=rate===100?'퍼펙트! 모든 세트 성공!':rate>=60?'잘 하셨어요!':'다음엔 더 잘 할 수 있어요!';
document.getElementById('done-dots').innerHTML=currentSetResults.map(r=>`<div class="dot ${r?'success':'fail'}">${r?'●':'○'}</div>`).join('');
document.getElementById('done-stats').innerHTML=`<div class="summary-box"><div class="num">${successCount}</div><div class="lbl">성공 세트</div></div><div class="summary-box"><div class="num">${rate}%</div><div class="lbl">성공률</div></div><div class="summary-box"><div class="num">${volume.toLocaleString()}</div><div class="lbl">유효 볼륨(kg)</div></div><div class="summary-box"><div class="num">${allSuccess?'+'+ex.increment+'kg':'유지'}</div><div class="lbl">다음 무게 변화</div></div>`;
document.getElementById('done-next-weight').textContent=`${ex.name}: ${nextWeight}kg (${allSuccess?'증가 🔺':'유지 ➡️'})`;
showPage('page-done');
}
function nextExercise(){
if(currentExIndex<selectedExercises.length-1){currentExIndex++;startExercise();}
else{navTo('page-home','nav-home');}
}
function startTimer(seconds,label,type,onEnd){
clearInterval(timerInterval);
let remaining=seconds;const total=seconds;
const box=document.getElementById('timer-box');
box.style.display='block';
document.getElementById('timer-ring-wrap').className='timer-ring-wrap '+(type==='success'?'ring-success':'ring-fail');
document.getElementById('timer-label').textContent=label;
const update=()=>{
const m=Math.floor(remaining/60),s=remaining%60;
document.getElementById('timer-num').textContent=m+':'+String(s).padStart(2,'0');
document.getElementById('ring-fg').style.strokeDashoffset=CIRC*(1-remaining/total);
};
update();
timerInterval=setInterval(()=>{remaining--;update();if(remaining<=0){clearInterval(timerInterval);box.style.display='none';if(onEnd)onEnd();}},1000);
}
function skipTimer(){clearInterval(timerInterval);document.getElementById('timer-box').style.display='none';}
async function loadHistory(){
try{
const logs=await api('GET','/workouts/history');
const el=document.getElementById('history-list');
if(!logs.length){el.innerHTML='<p style="color:#555">기록이 없어요.</p>';return;}
el.innerHTML=logs.map(l=>{
const date=new Date(l.date).toLocaleDateString('ko-KR');
const dots=l.set_results.map(r=>`<span style="color:${r?'#66bb6a':'#ef5350'}">${r?'●':'○'}</span>`).join('');
return`<div class="hist-row" style="flex-direction:column;align-items:flex-start;gap:4px"><div style="display:flex;justify-content:space-between;width:100%"><span style="font-weight:600">${l.exercise_name}</span><span style="color:#4fc3f7">${l.weight}kg</span><span style="color:#888;font-size:.78rem">${date}</span></div><div style="display:flex;gap:6px">${dots}</div></div>`;
}).join('');
}catch(e){}
}
if(token&&currentUser)enterApp();
</script>
</body>
</html>
